<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crossword ENT</title>

  <!-- ===== Open Graph: logo card only (no product description) ===== -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Crossword ENT">
  <meta property="og:title" content="Crossword ENT">
  <meta property="og:description" content="Coming soon.">
  <meta property="og:url" content="https://crosswordent.com/">
  <meta property="og:image" content="https://crosswordent.com/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Crossword ENT">

  <!-- ===== Twitter/X card ===== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Crossword ENT">
  <meta name="twitter:description" content="Coming soon.">
  <meta name="twitter:image" content="https://crosswordent.com/og-card.png">

  <meta name="theme-color" content="#CFE3F5">

  <style>
    *{box-sizing:border-box;margin:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:28px;color:#1A2E52;gap:34px;
      background:radial-gradient(circle at 50% 30%,#FFF7EC 0%,#DCEBF8 58%,#CFE3F5 100%)}
    img.logo{width:min(78vw,380px);height:auto;border-radius:28px;
      box-shadow:0 12px 30px rgba(20,40,80,.18)}
    span.soon{display:inline-block;background:#FF5E7A;color:#fff;font-weight:800;
      font-size:15px;letter-spacing:.8px;padding:12px 24px;border-radius:16px;
      box-shadow:0 6px 16px rgba(230,57,96,.30)}
  </style>
</head>
<body>
  <img class="logo" src="/logo.png" alt="Crossword ENT">
  <span class="soon">COMING SOON</span>
</body>
</html>
