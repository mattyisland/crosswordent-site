<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crossword ENT — Entertainment with friends</title>

  <!-- ===== Open Graph: draws the logo card in iMessage / chat apps ===== -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Crossword ENT">
  <meta property="og:title" content="Crossword ENT">
  <meta property="og:description" content="Entertainment with friends — trivia in crossword form. Coming soon.">
  <meta property="og:url" content="https://mattyisland.github.io/crosswordent-site/">
  <meta property="og:image" content="https://mattyisland.github.io/crosswordent-site/og-logo.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Crossword ENT logo">

  <!-- ===== Twitter/X card ===== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Crossword ENT">
  <meta name="twitter:description" content="Entertainment with friends — trivia in crossword form. Coming soon.">
  <meta name="twitter:image" content="https://mattyisland.github.io/crosswordent-site/og-logo.png">

  <meta name="theme-color" content="#CFE3F5">

  <style>
    *{box-sizing:border-box;margin:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:28px;color:#1A2E52;
      background:radial-gradient(circle at 50% 22%,#FFF7EC 0%,#DCEBF8 58%,#CFE3F5 100%)}
    img.logo{width:min(72vw,340px);height:auto;border-radius:28px;
      box-shadow:0 12px 30px rgba(20,40,80,.18)}
    h1{font-size:clamp(26px,7vw,40px);margin:22px 0 6px;letter-spacing:.3px}
    p.slogan{font-size:clamp(15px,4vw,19px);color:#42597e;margin-bottom:22px}
    span.soon{display:inline-block;background:#FF5E7A;color:#fff;font-weight:800;
      font-size:14px;letter-spacing:.6px;padding:10px 20px;border-radius:16px;
      box-shadow:0 6px 16px rgba(230,57,96,.30)}
    p.fine{margin-top:26px;font-size:12px;color:#7185a0}
  </style>
</head>
<body>
  <img class="logo" src="/og-logo.png" alt="Crossword ENT">
  <h1>Crossword ENT</h1>
  <p class="slogan">Entertainment with friends</p>
  <span class="soon">COMING SOON</span>
  <p class="fine">Trivia in crossword form — Solo Sprint &amp; Battle.</p>
</body>
</html>
